<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Conta Palavra</title>

        <link rel="stylesheet" href="css/index.css">
        <script src="js/index.js"></script>
    </head>
        <body>
            <div class="arquivo">
                Arquivo texto a ser lido:
                <br>
                <input type="file" id="input_file"/>
                <br>
                <button class="enviar" onclick="processFile(1)">Enviar</button>
            </div>

            <div class="texto">
                Texto a ser lido: 
                <br>
                <textarea id="input_text" placeholder="Seu texto aqui..."></textarea>
                <br>
                <button class="enviar" onclick="processFile(0)">Enviar</button>
            </div>

            <div id="output"></div>

        </body>
</html>
